name: Deploy to AWS Lambda

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1          # Change to your region
  ECR_REPOSITORY: scamshield-api  # Your ECR repo name
  LAMBDA_FUNCTION_NAME: scamshield-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    # - name: Login to GitHub Container Registry
    #   uses: docker/login-action@v3
    #   with:
    #     registry: ghcr.io
    #     username: ${{ github.actor }}
    #     password: ${{ secrets.GITHUB_TOKEN }}

    # - name: Push Image to GHCR
    #   env:
    #     ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
    #   run: |
    #     IMAGE_ID=ghcr.io/${{ github.repository }}
    #     # Convert to lowercase
    #     IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
    #     docker tag $ECR_REGISTRY/$ECR_REPOSITORY:latest $IMAGE_ID:latest
    #     docker tag $ECR_REGISTRY/$ECR_REPOSITORY:latest $IMAGE_ID:${{ github.sha }}
    #     docker push $IMAGE_ID:latest
    #     docker push $IMAGE_ID:${{ github.sha }}

    - name: Deploy to AWS App Runner
      id: deploy-apprunner
      uses: aws-actions/amazon-apprunner-deploy@v2
      with:
        service: scamshield-backend-service
        image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        access-role-arn: ${{ secrets.APP_RUNNER_ECR_ROLE_ARN }}
        region: ${{ env.AWS_REGION }}
        cpu: 1
        memory: 2
        port: 8080
        wait-for-service-stability-seconds: 1200

    - name: App Runner URL output
      run: echo "App Runner URL is ${{ steps.deploy-apprunner.outputs.service-url }}"
